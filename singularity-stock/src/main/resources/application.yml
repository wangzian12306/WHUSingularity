server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/singularity_stock?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

rocketmq:
  consumer:
    order:
      topic: ${ROCKETMQ_CONSUMER_ORDER_TOPIC:order-topic}
      group: ${ROCKETMQ_CONSUMER_ORDER_GROUP:stock-order-consumer-group}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
