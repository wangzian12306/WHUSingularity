server:
  port: 8087

spring:
  application:
    name: singularity-product
  datasource:
    url: jdbc:mysql://localhost:3306/singularity_product?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

rocketmq:
  producer:
    product:
      topic: ${ROCKETMQ_PRODUCER_PRODUCT_TOPIC:product-cache-topic}
  consumer:
    product:
      topic: ${ROCKETMQ_CONSUMER_PRODUCT_TOPIC:product-cache-topic}
      group: ${ROCKETMQ_CONSUMER_PRODUCT_GROUP:product-cache-consumer-group}
