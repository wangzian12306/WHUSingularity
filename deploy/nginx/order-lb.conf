# 容器内 listen 80；compose 可将宿主 8081/8181/8281 等同时映射到本端口。上游为 singularity-order（多副本时 Docker DNS 多 A 记录）。
# 如仅调网关可走 8080，无需经过本端口。
server {
    listen 80;
    location / {
        resolver 127.0.0.11 valid=5s ipv6=off;
        set $order_upstream singularity-order;
        proxy_pass http://$order_upstream:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
