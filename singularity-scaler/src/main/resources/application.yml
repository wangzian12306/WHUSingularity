server:
  port: 9090
  ssl:
    enabled: false

spring:
  application:
    name: singularity-scaler
  cloud:
    nacos:
      server-addr: ${SPRING_CLOUD_NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        enabled: true
        namespace: public
        group: DEFAULT_GROUP

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

scaler:
  interval-seconds: 15
  cooldown-seconds: 120
  metrics-max-snapshot-gap-seconds: 120
  history-size: 10
  # дёӨж¬ЎжҲҗеҠҹ QPS йҮҮж ·й—ҙйҡ”и¶…иҝҮжӯӨз§’ж•°еҲҷжң¬е‘ЁжңҹдёҚжҚ® QPS зј©жү©е®№пјҢйҒҝе…ҚгҖҢй•ҝж—¶й—ҙз©әзӘ— + е°ҸеўһйҮҸгҖҚз®—жҲҗеҒҮдҪҺ QPS
  # еҸҜйқ  QPS дёӢиҝһз»ӯж»Ўи¶ігҖҢеә”зј©е®№гҖҚзҡ„и°ғеәҰиҪ®ж•°пјҲжҜҸиҪ® interval-secondsпјүеҗҺжүҚзңҹжӯЈ scale down
  scale-down-min-consecutive-polls: 3
  # еүҜжң¬еҗҜеҠЁеҗҺж»ЎиҜҘз§’ж•°жүҚжҠҠ docker stats з”ЁдәҺжү©е®№пјӣеҗҜеҠЁжңҹ CPU й«ҳдёҚиҜҜеҲӨпјҲJVM жҢҮж Үд»ҚеҸҜи§ҰеҸ‘жү©е®№пјү
  docker-stats-grace-seconds-after-start: 30
  # Docker CPU жҡҙеўһпјҡдёҺдёҠдёҖиҪ®йҮҮж ·пјҲзәҰ interval-secondsпјүжҜ”иҫғпјҢО” жҲ–гҖҢidleвҶ’й«ҳиҙҹиҪҪгҖҚж»Ўи¶іеҲҷжү©е®№пјҲеҸҜдёҺ 70% з»қеҜ№йҳҲеҖјж— е…іпјү
  # дҫӢпјҡе№іеёё ~1% еҪ’дёҖеҢ–зәҰ 0.01пјҢеҺӢжөӢзһ¬ж—¶жү“ж»Ў cap=1.0пјҢО”вүҲ0.99 > 0.38пјӣidleвҶ’loadпјҡ0.01<0.18 дё” 1.0>=0.45
  docker-cpu-surge-delta-threshold: 0.42
  docker-cpu-surge-low-baseline: 0.18
  docker-cpu-surge-high-water: 0.52
  docker-cpu-surge-max-poll-gap-seconds: 50
  # иҮӘеҠЁзј©е®№пјҡdocker иҒҡеҗҲ CPUпјҲ0~1пјүд»Қ >= иҜҘеҖјж—¶дёҚеҲ еүҜжң¬пјӣ0=е…ій—ӯгҖӮе®ңдҪҺдәҺ cpu-scale-up-threshold(0.70)
  docker-cpu-scale-down-block-threshold: 0.35
  compose-project: ${SCALER_COMPOSE_PROJECT:singularity}
  compose-file: ${SCALER_COMPOSE_FILE:/workspace/deploy/docker-compose.backend.yml}
  services:
    - name: singularity-order
      scale-mode: compose
      compose-service: singularity-order
      base-port: 8081
      port-step: 2
      min-instances: 1
      max-instances: 5
      cpu-scale-up-threshold: 0.70
      memory-scale-up-threshold: 0.80
      cpu-scale-down-threshold: 0.20
      memory-scale-down-threshold: 0.30
      docker-cpu-scale-down-block-threshold: 0.35
      scale-down-consecutive-periods: 3
      image: maven:3.9.9-eclipse-temurin-21
      env:
        SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/singularity_order?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: "6379"
        ROCKETMQ_NAME_SERVER: rmq-namesrv:9876
        ROCKETMQ_PRODUCER_GROUP: order-producer-group
        ROCKETMQ_CONSUMER_GROUP: order-consumer-group
        SPRING_APPLICATION_JSON: '{"singularity":{"order":{"slots":[{"id":"bucket-1","redis-key":"stock:bucket-1","product-id":"PROD_001"},{"id":"bucket-2","redis-key":"stock:bucket-2","product-id":"PROD_002"}]}}}'
    - name: singularity-user
      scale-mode: compose
      compose-service: singularity-user
      base-port: 8090
      port-step: 1
      min-instances: 1
      max-instances: 5
      cpu-scale-up-threshold: 0.70
      memory-scale-up-threshold: 0.80
      cpu-scale-down-threshold: 0.20
      memory-scale-down-threshold: 0.30
      scale-down-consecutive-periods: 3
      image: maven:3.9.9-eclipse-temurin-21
      env:
        SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/singularity_user?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: "6379"
        JWT_SECRET: dev-secret-key
    - name: singularity-stock
      scale-mode: compose
      compose-service: singularity-stock
      base-port: 8082
      port-step: 2
      min-instances: 1
      max-instances: 5
      cpu-scale-up-threshold: 0.70
      memory-scale-up-threshold: 0.80
      cpu-scale-down-threshold: 0.20
      memory-scale-down-threshold: 0.30
      scale-down-consecutive-periods: 3
      image: maven:3.9.9-eclipse-temurin-21
      env:
        SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/singularity_stock?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: "6379"
        ROCKETMQ_NAME_SERVER: rmq-namesrv:9876
        ROCKETMQ_CONSUMER_GROUP: stock-consumer-group
    - name: singularity-product
      scale-mode: compose
      compose-service: singularity-product
      base-port: 8087
      port-step: 1
      min-instances: 1
      max-instances: 5
      cpu-scale-up-threshold: 0.70
      memory-scale-up-threshold: 0.80
      cpu-scale-down-threshold: 0.20
      memory-scale-down-threshold: 0.30
      scale-down-consecutive-periods: 3
      image: maven:3.9.9-eclipse-temurin-21
      env:
        SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/singularity_product?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: "6379"
