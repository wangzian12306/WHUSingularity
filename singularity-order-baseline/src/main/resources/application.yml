server:
  port: 8085

spring:
  application:
    name: singularity-order-baseline
  datasource:
    url: jdbc:mysql://localhost:3306/singularity_order_baseline?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:baseline-order-producer-group}

baseline:
  benchmark:
    product-id: 1001
    redis-stock-key: baseline:stock:1001
    slot-id: baseline
  mq:
    topic: ${BASELINE_MQ_TOPIC:baseline-order-topic}
    consumer-group: ${BASELINE_MQ_CONSUMER_GROUP:baseline-order-consumer-group}
  user-service:
    base-url: ${BASELINE_USER_SERVICE_URL:http://localhost:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
