# Docker / compose：MySQL + Nacos 注册（与 deploy/docker-compose.backend.yml 配套）
server:
  port: 8091

spring:
  h2:
    console:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/singularity_merchant?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  cloud:
    nacos:
      discovery:
        enabled: true
      config:
        enabled: true

jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-32-characters-long}
