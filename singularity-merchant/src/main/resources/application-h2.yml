server:
  port: 8091

spring:
  application:
    name: singularity-merchant
  datasource:
    url: jdbc:h2:mem:singularity_merchant;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:init-schema.sql
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
