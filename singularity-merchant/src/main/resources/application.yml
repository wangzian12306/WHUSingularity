server:
  port: 8091

spring:
  application:
    name: singularity-merchant
  profiles:
    active: h2
  datasource:
    url: jdbc:h2:mem:singularity_merchant;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:init-schema.sql
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: whu-singularity-merchant-jwt-secret-key-2024

product:
  service:
    url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
